<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F9FAFB">
  <title>Clock In/Out</title>
  <style>
    :root {
      --bg: #F9FAFB;
      --card: #FFFFFF;
      --card-border: #E5E7EB;
      --text: #111827;
      --text-muted: #6B7280;
      --primary: #2563EB;
      --green: #16A34A;
      --green-bg: #DCFCE7;
      --green-border: #86EFAC;
      --red: #DC2626;
      --red-bg: #FEE2E2;
      --red-border: #FCA5A5;
      --yellow: #F59E0B;
      --yellow-bg: #FEF3C7;
      --yellow-border: #FCD34D;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 40px 28px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 1px 3px rgba(17,24,39,0.04), 0 1px 2px rgba(17,24,39,0.03);
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 24px;
    }
    .icon.clocked-in { background: var(--green-bg); }
    .icon.clocked-out { background: var(--red-bg); }

    .greeting { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .name { font-size: 26px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.02em; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: 4px;
      font-size: 13px; font-weight: 600;
      margin-bottom: 32px;
      border: 1px solid transparent;
    }
    .status-pill .dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .status-pill.in { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
    .status-pill.in .dot { background: var(--green); animation: pulse 2s infinite; }
    .status-pill.out { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
    .status-pill.out .dot { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px 24px; border: 1px solid transparent;
      border-radius: 6px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all 0.15s ease;
      letter-spacing: -0.01em;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-in { background: var(--green); color: #fff; border-color: var(--green); }
    .btn-in:hover:not(:disabled) { background: #15803D; border-color: #15803D; }
    .btn-out { background: var(--red); color: #fff; border-color: var(--red); }
    .btn-out:hover:not(:disabled) { background: #B91C1C; border-color: #B91C1C; }

    .btn svg { width: 18px; height: 18px; }

    .message {
      margin-top: 16px; padding: 12px 14px; border-radius: 6px;
      font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 10px;
      border: 1px solid transparent; text-align: left;
    }
    .message svg { width: 16px; height: 16px; flex-shrink: 0; }
    .message.success { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
    .message.error { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
    .message.warning { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }

    .loading {
      color: var(--text-muted); font-size: 15px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .spinner {
      width: 28px; height: 28px; border: 2.5px solid var(--card-border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .timestamp { color: var(--text-muted); font-size: 12px; margin-top: 12px; }

    .footer { margin-top: 24px; font-size: 12px; color: var(--text-muted); letter-spacing: 0.02em; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div class="loading">
      <div class="spinner"></div>
      Loading...
    </div>
  </div>
  <div class="footer">Attendance System</div>

  <script>
    const token = window.location.pathname.split('/clock/')[1];
    const app = document.getElementById('app');

    let employeeName = '';
    let currentStatus = 'out';

    async function loadStatus() {
      try {
        const res = await fetch(`/api/status/${token}`);
        if (!res.ok) {
          app.innerHTML = `<div class="loading">
            <svg width="40" height="40" fill="none" stroke="#DC2626" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
            Employee not found
          </div>`;
          return;
        }
        const data = await res.json();
        employeeName = data.name;
        currentStatus = data.status;
        render();
      } catch {
        app.innerHTML = '<div class="loading">Connection error. Pull down to retry.</div>';
      }
    }

    function render(message) {
      const nextAction = currentStatus === 'out' ? 'in' : 'out';
      const isIn = currentStatus === 'in';

      const clockIcon = nextAction === 'in'
        ? '<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>'
        : '<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M17 7l-10 10M7 7l10 10"/></svg>';

      app.innerHTML = `
        <div class="icon ${isIn ? 'clocked-in' : 'clocked-out'}">
          ${isIn ? '<svg width="28" height="28" fill="none" stroke="#16A34A" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>'
                 : '<svg width="28" height="28" fill="none" stroke="#DC2626" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>'}
        </div>
        <div class="greeting">Welcome back</div>
        <div class="name">${employeeName}</div>
        <div class="status-pill ${currentStatus}">
          <span class="dot"></span>
          ${isIn ? 'Currently Clocked In' : 'Currently Clocked Out'}
        </div>
        <button class="btn btn-${nextAction}" id="clockBtn">
          ${clockIcon}
          Clock ${nextAction === 'in' ? 'In' : 'Out'}
        </button>
        ${message || ''}
      `;

      document.getElementById('clockBtn').addEventListener('click', doClock);
    }

    function getLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
          () => resolve(null),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });
    }

    async function doClock() {
      const btn = document.getElementById('clockBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div> Verifying location...';

      const location = await getLocation();

      btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div> Submitting...';

      try {
        const res = await fetch(`/api/clock/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(location || {})
        });
        const data = await res.json();

        if (!res.ok) {
          render(`<div class="message error">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            ${data.error}
          </div>`);
          return;
        }

        currentStatus = data.type === 'in' ? 'in' : 'out';
        const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        const fallbackNote = data.verification === 'geo-fallback'
          ? `<div class="message warning">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2M12 15h.01"/><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
              WiFi not verified &mdash; location fallback used
            </div>`
          : '';

        render(`
          <div class="message success">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
            Clocked ${data.type} at ${time}
          </div>
          ${fallbackNote}
        `);
      } catch {
        render(`<div class="message error">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          Connection error. Please try again.
        </div>`);
      }
    }

    loadStatus();
  </script>
</body>
</html>
