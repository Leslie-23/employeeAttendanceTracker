<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FEFCE8">
  <title>Clock In/Out // PAL-tech Attendance</title>
  <meta name="description" content="Employee clock-in terminal. Tap to record your arrival or departure — verified by WiFi and GPS.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="PAL-tech Attendance // Clock In/Out">
  <meta property="og:description" content="Employee clock-in terminal. Tap to record your arrival or departure — verified by WiFi and GPS.">
  <meta property="og:image" content="/og.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="/og.svg">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23111'/%3E%3Crect x='6' y='6' width='20' height='20' fill='%23FACC15'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FEFCE8;
      --card: #FFFFFF;
      --ink: #111111;
      --muted: #555555;
      --primary: #2563EB;
      --green: #16A34A;
      --red: #DC2626;
      --yellow: #FACC15;
      --shadow: 6px 6px 0 var(--ink);
      --shadow-sm: 4px 4px 0 var(--ink);
      --shadow-pressed: 2px 2px 0 var(--ink);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
      background-image:
        linear-gradient(var(--ink) 1px, transparent 1px),
        linear-gradient(90deg, var(--ink) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: -1px -1px;
      background-color: var(--bg);
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: var(--bg);
      opacity: 0.92;
      z-index: -1;
    }

    .card {
      background: var(--card);
      border: 3px solid var(--ink);
      border-radius: 0;
      padding: 36px 28px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow);
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translate(-6px, -6px); }
      to { opacity: 1; transform: translate(0, 0); }
    }

    .tag {
      display: inline-block;
      background: var(--ink); color: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 700;
      padding: 4px 10px; letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(22px, 7vw, 32px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 8px;
      text-transform: uppercase;
      word-break: break-word;
      overflow-wrap: anywhere;
      hyphens: auto;
    }
    .greeting {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 24px;
    }

    .status-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px; border: 2px solid var(--ink);
      font-size: 12px; font-weight: 700;
      margin-bottom: 28px;
      text-transform: uppercase; letter-spacing: 0.08em;
      font-family: 'JetBrains Mono', monospace;
    }
    .status-pill .dot {
      width: 10px; height: 10px; border: 2px solid var(--ink);
    }
    .status-pill.in { background: var(--green); color: var(--ink); }
    .status-pill.in .dot { background: var(--ink); animation: blink 1.2s infinite; }
    .status-pill.out { background: var(--red); color: #FFF; border-color: var(--ink); }
    .status-pill.out .dot { background: var(--ink); }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0.2} }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 18px 24px;
      border: 3px solid var(--ink); border-radius: 0;
      font-family: 'Syne', sans-serif;
      font-size: 18px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.03em;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }
    .btn:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: var(--shadow-pressed);
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-in { background: var(--green); color: var(--ink); }
    .btn-out { background: var(--red); color: #FFF; }
    .btn svg { width: 20px; height: 20px; stroke-width: 2.5; }

    .message {
      margin-top: 16px; padding: 12px 14px;
      border: 2px solid var(--ink);
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 10px;
      text-align: left;
      box-shadow: var(--shadow-pressed);
    }
    .message svg { width: 18px; height: 18px; flex-shrink: 0; stroke-width: 2.5; }
    .message.success { background: var(--green); color: var(--ink); }
    .message.error { background: var(--red); color: #FFF; }
    .message.warning { background: var(--yellow); color: var(--ink); }

    .loading {
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid var(--ink);
      border-right-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.15em;
    }
    .footer span { border-bottom: 2px solid var(--ink); padding-bottom: 2px; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div class="loading">
      <div class="spinner"></div>
      Loading...
    </div>
  </div>
  <div class="footer"><span>// ATTENDANCE.SYS</span></div>

  <script>
    const token = window.location.pathname.split('/clock/')[1];
    const app = document.getElementById('app');

    let employeeName = '';
    let currentStatus = 'out';

    async function loadStatus() {
      try {
        const res = await fetch(`/api/status/${token}`);
        if (!res.ok) {
          app.innerHTML = `<div class="loading">
            <svg width="40" height="40" fill="none" stroke="#111" stroke-width="3" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
            Employee Not Found
          </div>`;
          return;
        }
        const data = await res.json();
        employeeName = data.name;
        currentStatus = data.status;
        render();
      } catch {
        app.innerHTML = '<div class="loading">Connection Error</div>';
      }
    }

    function render(message) {
      const nextAction = currentStatus === 'out' ? 'in' : 'out';
      const isIn = currentStatus === 'in';

      const icon = nextAction === 'in'
        ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M3 3h18v18H3z"/></svg>'
        : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>';

      app.innerHTML = `
        <div class="tag">● EMPLOYEE</div>
        <div class="name">${employeeName}</div>
        <div class="greeting">[ Terminal Access ]</div>
        <div class="status-pill ${currentStatus}">
          <span class="dot"></span>
          ${isIn ? 'Currently IN' : 'Currently OUT'}
        </div>
        <button class="btn btn-${nextAction}" id="clockBtn">
          ${icon}
          Clock ${nextAction === 'in' ? 'In' : 'Out'}
        </button>
        ${message || ''}
      `;

      document.getElementById('clockBtn').addEventListener('click', doClock);
    }

    // Uses watchPosition to stream readings and picks the freshest high-accuracy
    // fix. getCurrentPosition can hand back a stale cached reading on mobile even
    // with maximumAge:0, so we filter by pos.timestamp age instead.
    // Returns { location, error } — error is 'denied' | 'unavailable' | 'timeout' | 'unsupported'.
    function getLocation(onProgress) {
      return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve({ error: 'unsupported' });

        let best = null;
        let done = false;
        let lastError = null;

        const finish = (watchId) => {
          if (done) return;
          done = true;
          navigator.geolocation.clearWatch(watchId);
          if (best) return resolve({ location: best });
          if (lastError === 1) return resolve({ error: 'denied' });
          if (lastError === 2) return resolve({ error: 'unavailable' });
          return resolve({ error: 'timeout' });
        };

        const watchId = navigator.geolocation.watchPosition(
          (pos) => {
            const age = Date.now() - pos.timestamp;
            const reading = {
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              accuracy: pos.coords.accuracy,
              age
            };

            if (onProgress) onProgress(reading);

            // Ignore obviously cached readings (older than 10s)
            if (age > 10000) return;

            if (!best || reading.accuracy < best.accuracy) best = reading;

            // Good enough: fresh AND accurate to within 40m
            if (age < 5000 && reading.accuracy <= 40) finish(watchId);
          },
          (err) => {
            lastError = err.code;
            // Permission denied is terminal — no point waiting
            if (err.code === 1) finish(watchId);
          },
          { enableHighAccuracy: true, timeout: 25000, maximumAge: 0 }
        );

        // Hard cap: 18s. Return whatever fresh reading we have, even if not perfect.
        setTimeout(() => finish(watchId), 18000);
      });
    }

    // Returns 'granted' | 'denied' | 'prompt' | 'unknown'. Safari iOS <16 has no
    // Permissions API for geolocation, so we fall back to 'unknown'.
    async function getGeoPermission() {
      if (!navigator.permissions) return 'unknown';
      try {
        const status = await navigator.permissions.query({ name: 'geolocation' });
        return status.state;
      } catch {
        return 'unknown';
      }
    }

    function renderLocationBlocked() {
      const ua = navigator.userAgent;
      let steps;
      if (/iPhone|iPad|iPod/i.test(ua)) {
        steps = `
          <li>Open <b>Settings → Safari → Location</b> and set to <b>Ask</b> or <b>Allow</b></li>
          <li>Also check <b>Settings → Privacy &amp; Security → Location Services</b> is ON</li>
          <li>Return here and reload the page</li>`;
      } else if (/Android/i.test(ua)) {
        steps = `
          <li>Tap the <b>lock icon</b> in the address bar → <b>Permissions</b> → <b>Location → Allow</b></li>
          <li>Make sure phone <b>Location</b> is ON in quick settings</li>
          <li>Reload the page</li>`;
      } else {
        steps = `
          <li>Click the <b>lock icon</b> in the address bar → allow <b>Location</b></li>
          <li>Reload the page</li>`;
      }

      render(`<div class="message error">
        <div>
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:inline;vertical-align:-3px;margin-right:6px;"><path d="M12 2a7 7 0 017 7c0 5-7 13-7 13S5 14 5 9a7 7 0 017-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          <b>Location blocked</b>
          <div style="margin-top:8px;font-weight:500;font-size:12px;line-height:1.5;">
            Your browser is blocking location access. Enable it, then tap Clock ${currentStatus === 'out' ? 'In' : 'Out'} again.
          </div>
          <ol style="margin:10px 0 0 18px;font-size:12px;font-weight:500;line-height:1.6;">
            ${steps}
          </ol>
        </div>
      </div>`);
    }

    async function doClock() {
      const btn = document.getElementById('clockBtn');
      btn.disabled = true;

      // If the user previously denied geolocation, the browser won't re-prompt
      // automatically — jump straight to the "how to unblock" instructions.
      const permission = await getGeoPermission();
      if (permission === 'denied') {
        renderLocationBlocked();
        return;
      }

      btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2.5px;"></div> REQUESTING GPS...';

      const result = await getLocation((r) => {
        btn.innerHTML = `<div class="spinner" style="width:18px;height:18px;border-width:2.5px;"></div> GPS ±${Math.round(r.accuracy)}m...`;
      });

      if (result.error === 'denied') {
        renderLocationBlocked();
        return;
      }
      if (result.error === 'unavailable' || result.error === 'unsupported') {
        render(`<div class="message error">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20"/><path d="M12 8v4M12 16h.01"/></svg>
          GPS unavailable. Step outside or near a window and try again.
        </div>`);
        return;
      }
      if (result.error === 'timeout') {
        render(`<div class="message error">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20"/><path d="M12 8v4M12 16h.01"/></svg>
          GPS timed out. Make sure Location is ON and try again.
        </div>`);
        return;
      }

      const location = result.location;
      btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2.5px;"></div> SUBMITTING...';

      try {
        const res = await fetch(`/api/clock/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(location || {})
        });
        const data = await res.json();

        if (!res.ok) {
          let debugInfo = '';
          if (data.debug) {
            const d = data.debug;
            debugInfo = `<div style="margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;opacity:0.85;text-align:left;line-height:1.6;">
              GPS: ${d.gotLocation ? 'OK' : 'NOT SHARED'}<br>
              ${d.distanceMeters != null ? 'DISTANCE: ' + d.distanceMeters + 'm (limit ' + d.allowedRadius + 'm)<br>' : ''}
              ${!d.officeConfigured ? 'SERVER NOT CONFIGURED<br>' : ''}
              IP: ${d.ip}
            </div>`;
          }
          render(`<div class="message error">
            <div>
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:inline;vertical-align:-3px;margin-right:6px;"><rect x="2" y="2" width="20" height="20"/><path d="M12 8v4M12 16h.01"/></svg>
              ${data.error}
              ${debugInfo}
            </div>
          </div>`);
          return;
        }

        currentStatus = data.type === 'in' ? 'in' : 'out';
        const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        const fallbackNote = data.verification === 'geo-fallback'
          ? `<div class="message warning">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M2 22L12 2l10 20z"/><path d="M12 9v4M12 18h.01"/></svg>
              WiFi unverified &mdash; GPS fallback
            </div>`
          : '';

        render(`
          <div class="message success">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20"/><path d="M7 12l3 3 7-7"/></svg>
            Clocked ${data.type.toUpperCase()} @ ${time}
          </div>
          ${fallbackNote}
        `);
      } catch {
        render(`<div class="message error">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20"/><path d="M12 8v4M12 16h.01"/></svg>
          Connection Error
        </div>`);
      }
    }

    loadStatus();
  </script>
</body>
</html>
