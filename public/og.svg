<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#111111"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#FEFCE8"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.5"/>

  <!-- Top black bar -->
  <rect x="0" y="0" width="1200" height="62" fill="#111111"/>
  <rect x="40" y="23" width="16" height="16" fill="#FACC15" stroke="#FEFCE8" stroke-width="2"/>
  <text x="68" y="41" font-family="Syne, sans-serif" font-weight="800" font-size="20" fill="#FEFCE8" letter-spacing="-0.5">PAL-TECH ATTENDANCE</text>
  <circle cx="1130" cy="31" r="5" fill="#16A34A"/>
  <text x="1145" y="36" font-family="JetBrains Mono, monospace" font-weight="700" font-size="12" fill="#FEFCE8" letter-spacing="1.5">ONLINE</text>

  <!-- Main card -->
  <g transform="translate(80, 130)">
    <rect x="8" y="8" width="1040" height="420" fill="#111111"/>
    <rect width="1040" height="420" fill="#FFFFFF" stroke="#111111" stroke-width="4"/>

    <!-- Tag -->
    <rect x="48" y="48" width="170" height="30" fill="#111111"/>
    <text x="60" y="68" font-family="JetBrains Mono, monospace" font-weight="700" font-size="13" fill="#FEFCE8" letter-spacing="2">● EMPLOYEE LOG</text>

    <!-- Heading -->
    <text x="48" y="165" font-family="Syne, sans-serif" font-weight="800" font-size="98" fill="#111111" letter-spacing="-3">CLOCK IN.</text>
    <text x="48" y="255" font-family="Syne, sans-serif" font-weight="800" font-size="98" fill="#111111" letter-spacing="-3">CLOCK OUT.</text>

    <!-- Subhead -->
    <text x="48" y="310" font-family="Inter, sans-serif" font-weight="500" font-size="22" fill="#555555">
      QR-based attendance for small shops. No hardware.
    </text>
    <text x="48" y="338" font-family="Inter, sans-serif" font-weight="500" font-size="22" fill="#555555">
      Verified by WiFi + GPS. Honest audit trail.
    </text>

    <!-- Pills -->
    <g transform="translate(48, 370)">
      <rect width="110" height="32" fill="#16A34A" stroke="#111111" stroke-width="2"/>
      <text x="55" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="700" font-size="12" fill="#111111" letter-spacing="1.5">QR SCAN</text>

      <rect x="122" width="110" height="32" fill="#FACC15" stroke="#111111" stroke-width="2"/>
      <text x="177" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="700" font-size="12" fill="#111111" letter-spacing="1.5">GEOFENCE</text>

      <rect x="244" width="110" height="32" fill="#2563EB" stroke="#111111" stroke-width="2"/>
      <text x="299" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="700" font-size="12" fill="#FFFFFF" letter-spacing="1.5">WIFI AUTH</text>
    </g>

    <!-- Decorative stamp -->
    <g transform="translate(820, 90) rotate(8)">
      <rect x="6" y="6" width="170" height="170" fill="#111111"/>
      <rect width="170" height="170" fill="#FACC15" stroke="#111111" stroke-width="4"/>
      <text x="85" y="60" text-anchor="middle" font-family="Syne, sans-serif" font-weight="800" font-size="22" fill="#111111">NO</text>
      <text x="85" y="92" text-anchor="middle" font-family="Syne, sans-serif" font-weight="800" font-size="22" fill="#111111">HARDWARE</text>
      <text x="85" y="124" text-anchor="middle" font-family="Syne, sans-serif" font-weight="800" font-size="22" fill="#111111">NEEDED</text>
      <line x1="20" y1="140" x2="150" y2="140" stroke="#111111" stroke-width="2"/>
      <text x="85" y="158" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="700" font-size="11" fill="#111111" letter-spacing="1">2026</text>
    </g>
  </g>

  <!-- Footer stripe -->
  <rect x="0" y="590" width="1200" height="40" fill="#111111"/>
  <text x="40" y="616" font-family="JetBrains Mono, monospace" font-weight="700" font-size="13" fill="#FEFCE8" letter-spacing="2">// BUILT BY LESLIE PAUL</text>
  <text x="1160" y="616" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="700" font-size="13" fill="#FACC15" letter-spacing="2">PAL-TECH ATTENDANCE</text>
</svg>
