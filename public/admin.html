<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F9FAFB">
  <title>Attendance Admin</title>
  <style>
    :root {
      --bg: #F9FAFB;
      --card: #FFFFFF;
      --card-border: #E5E7EB;
      --card-border-strong: #D1D5DB;
      --text: #111827;
      --text-muted: #6B7280;
      --text-dim: #9CA3AF;
      --accent: #2563EB;
      --accent-hover: #1D4ED8;
      --green: #16A34A;
      --green-bg: #DCFCE7;
      --green-border: #86EFAC;
      --red: #DC2626;
      --red-bg: #FEE2E2;
      --red-border: #FCA5A5;
      --yellow: #F59E0B;
      --yellow-bg: #FEF3C7;
      --yellow-border: #FCD34D;
      --input-bg: #FFFFFF;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Top bar --- */
    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--card-border);
      padding: 14px 20px;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h1 {
      font-size: 18px; font-weight: 700; letter-spacing: -0.02em;
      display: flex; align-items: center; gap: 10px;
    }
    .topbar h1 svg { width: 22px; height: 22px; color: var(--accent); }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* --- Layout --- */
    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

    .section {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 2px rgba(17,24,39,0.04);
      animation: fadeUp 0.35s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-header h2 {
      font-size: 16px; font-weight: 700; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 8px;
    }
    .section-header h2 svg { width: 18px; height: 18px; color: var(--text-muted); }
    .count-badge {
      background: #F3F4F6; color: var(--text-muted);
      font-size: 12px; font-weight: 600; padding: 2px 10px;
      border-radius: 4px; border: 1px solid var(--card-border);
    }

    /* --- Form --- */
    .add-form {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .add-form input {
      flex: 1; padding: 10px 14px;
      background: var(--input-bg); border: 1px solid var(--card-border-strong);
      border-radius: 6px; color: var(--text); font-size: 14px;
      outline: none; transition: all 0.15s;
    }
    .add-form input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .add-form input::placeholder { color: var(--text-dim); }
    .add-form button {
      padding: 10px 20px; background: var(--accent); color: white;
      border: 1px solid var(--accent); border-radius: 6px; font-size: 14px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .add-form button:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    /* --- Table --- */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -24px; padding: 0 24px; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th {
      text-align: left; padding: 10px 12px;
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid var(--card-border);
      background: #F9FAFB;
    }
    td {
      padding: 12px; border-bottom: 1px solid var(--card-border);
      font-size: 14px; color: var(--text);
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #F9FAFB; }
    .emp-name { font-weight: 600; }

    /* --- Badges --- */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
      border: 1px solid transparent;
    }
    .badge .dot { width: 6px; height: 6px; border-radius: 50%; }
    .badge.in { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
    .badge.in .dot { background: var(--green); }
    .badge.out { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
    .badge.out .dot { background: var(--red); }
    .badge.wifi { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
    .badge.geo-fallback { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }

    /* --- Action buttons --- */
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .actions button {
      padding: 6px 12px; border: 1px solid var(--card-border-strong);
      border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
      background: var(--card); color: var(--text); transition: all 0.15s;
    }
    .actions button:hover { background: #F9FAFB; border-color: #9CA3AF; }
    .actions .btn-delete { border-color: var(--red-border); color: var(--red); }
    .actions .btn-delete:hover { background: var(--red-bg); border-color: var(--red); }

    /* --- Filters --- */
    .filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-row input, .filter-row select {
      padding: 8px 12px;
      background: var(--input-bg); border: 1px solid var(--card-border-strong);
      border-radius: 6px; color: var(--text); font-size: 14px; outline: none;
      transition: all 0.15s;
    }
    .filter-row input:focus, .filter-row select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

    /* --- Modal --- */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(17,24,39,0.5); backdrop-filter: blur(2px);
      z-index: 100; justify-content: center; align-items: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 8px; padding: 32px 28px;
      text-align: center; max-width: 380px; width: 100%;
      box-shadow: 0 20px 25px -5px rgba(17,24,39,0.1), 0 8px 10px -6px rgba(17,24,39,0.1);
      animation: fadeUp 0.2s ease;
    }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
    .modal .qr-container {
      background: #FFFFFF; border: 1px solid var(--card-border);
      border-radius: 6px; padding: 12px;
      display: inline-block; margin-bottom: 16px;
    }
    .modal img { width: 220px; height: 220px; display: block; }
    .modal .url {
      font-size: 11px; color: var(--text-muted);
      word-break: break-all; margin-bottom: 20px;
      font-family: 'SF Mono', 'Consolas', monospace;
      background: #F9FAFB; padding: 8px; border-radius: 4px;
      border: 1px solid var(--card-border);
    }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns button {
      flex: 1; padding: 10px; border: 1px solid transparent; border-radius: 6px;
      cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.15s;
    }
    .btn-dl { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-dl:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-print-modal { background: var(--card); color: var(--text); border-color: var(--card-border-strong); }
    .btn-print-modal:hover { background: #F9FAFB; }
    .btn-close { background: var(--card); color: var(--text-muted); border-color: var(--card-border-strong); }
    .btn-close:hover { background: #F9FAFB; color: var(--text); }

    .empty-state {
      text-align: center; padding: 32px 16px; color: var(--text-dim); font-size: 14px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .section { padding: 16px; }
      .table-wrap { margin: 0 -16px; padding: 0 16px; }
      .add-form { flex-direction: column; }
      .add-form button { width: 100%; }
      .modal { padding: 24px 20px; }
      .modal img { width: 180px; height: 180px; }
      .modal-btns { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <h1>
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Attendance
      </h1>
      <div class="live-dot" title="System Online"></div>
    </div>
  </div>

  <div class="container">
    <!-- Employees -->
    <div class="section">
      <div class="section-header">
        <h2>
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          Employees
        </h2>
        <span class="count-badge" id="empCount">0</span>
      </div>
      <div class="add-form">
        <input type="text" id="empName" placeholder="Enter employee name..." onkeydown="if(event.key==='Enter')addEmployee()">
        <button onclick="addEmployee()">Add Employee</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>QR Code</th><th>Actions</th></tr></thead>
          <tbody id="empList"></tbody>
        </table>
      </div>
    </div>

    <!-- Attendance -->
    <div class="section">
      <div class="section-header">
        <h2>
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          Attendance Log
        </h2>
      </div>
      <div class="filter-row">
        <input type="date" id="filterDate" onchange="loadAttendance()">
        <select id="filterEmployee" onchange="loadAttendance()">
          <option value="">All Employees</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Employee</th><th>Type</th><th>Time</th><th>Verified</th><th>IP</th></tr></thead>
          <tbody id="attendanceList"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- QR Modal -->
  <div class="modal-overlay" id="qrModal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3 id="qrName"></h3>
      <div class="qr-container">
        <img id="qrImg" alt="QR Code">
      </div>
      <div class="url" id="qrUrl"></div>
      <div class="modal-btns">
        <button class="btn-dl" onclick="downloadQR()">Download</button>
        <button class="btn-print-modal" onclick="printCurrentQR()">Print</button>
        <button class="btn-close" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    let employees = [];

    async function loadEmployees() {
      const res = await fetch('/api/employees');
      employees = await res.json();

      document.getElementById('empCount').textContent = employees.length;

      const list = document.getElementById('empList');
      if (employees.length === 0) {
        list.innerHTML = '<tr><td colspan="3"><div class="empty-state">No employees yet. Add one above.</div></td></tr>';
      } else {
        list.innerHTML = employees.map(e => `
          <tr>
            <td class="emp-name">${esc(e.name)}</td>
            <td>
              <div class="actions">
                <button onclick="showQR('${e.qrToken}', '${esc(e.name)}')">View QR</button>
              </div>
            </td>
            <td>
              <div class="actions">
                <button onclick="showQR('${e.qrToken}', '${esc(e.name)}')">Print</button>
                <button class="btn-delete" onclick="deleteEmployee('${e._id}')">Delete</button>
              </div>
            </td>
          </tr>
        `).join('');
      }

      // Update filter
      const select = document.getElementById('filterEmployee');
      const current = select.value;
      select.innerHTML = '<option value="">All Employees</option>' +
        employees.map(e => `<option value="${e._id}">${esc(e.name)}</option>`).join('');
      select.value = current;
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    async function addEmployee() {
      const input = document.getElementById('empName');
      const name = input.value.trim();
      if (!name) return;

      const btn = input.nextElementSibling;
      btn.disabled = true; btn.textContent = 'Adding...';

      await fetch('/api/employees', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });

      input.value = '';
      btn.disabled = false; btn.textContent = 'Add Employee';
      loadEmployees();
    }

    async function deleteEmployee(id) {
      if (!confirm('Delete this employee and all their attendance records?')) return;
      await fetch(`/api/employees/${id}`, { method: 'DELETE' });
      loadEmployees();
      loadAttendance();
    }

    async function showQR(token, name) {
      const res = await fetch(`/api/qr/${token}`);
      const data = await res.json();

      document.getElementById('qrName').textContent = name;
      document.getElementById('qrImg').src = data.qr;
      document.getElementById('qrUrl').textContent = data.url;
      document.getElementById('qrModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('qrModal').classList.remove('active');
    }

    function downloadQR() {
      const img = document.getElementById('qrImg');
      const name = document.getElementById('qrName').textContent;
      const a = document.createElement('a');
      a.href = img.src;
      a.download = `QR-${name}.png`;
      a.click();
    }

    function printCurrentQR() {
      const img = document.getElementById('qrImg').src;
      const name = document.getElementById('qrName').textContent;
      const printWin = window.open('', '_blank');
      printWin.document.write(`
        <html><body style="text-align:center;font-family:-apple-system,sans-serif;padding:60px 40px;">
          <h1 style="font-size:28px;margin-bottom:8px;">${name}</h1>
          <p style="color:#666;margin-bottom:32px;font-size:14px;">Employee Attendance</p>
          <img src="${img}" style="width:280px;height:280px;">
          <p style="color:#999;margin-top:24px;font-size:13px;">Scan this QR code to clock in/out</p>
        </body></html>
      `);
      printWin.document.close();
      setTimeout(() => printWin.print(), 300);
    }

    async function loadAttendance() {
      const date = document.getElementById('filterDate').value;
      const employeeId = document.getElementById('filterEmployee').value;

      const params = new URLSearchParams();
      if (date) params.set('date', date);
      if (employeeId) params.set('employeeId', employeeId);

      const res = await fetch(`/api/attendance?${params}`);
      const records = await res.json();

      const list = document.getElementById('attendanceList');
      if (records.length === 0) {
        list.innerHTML = '<tr><td colspan="5"><div class="empty-state">No records for this date.</div></td></tr>';
      } else {
        list.innerHTML = records.map(r => {
          const isGeoFallback = r.verification === 'geo-fallback';
          const verClass = isGeoFallback ? 'geo-fallback' : 'wifi';
          const verLabel = isGeoFallback ? 'GPS Fallback' : 'WiFi';
          return `
            <tr>
              <td class="emp-name">${r.employeeId ? esc(r.employeeId.name) : 'Unknown'}</td>
              <td><span class="badge ${r.type}"><span class="dot"></span>${r.type === 'in' ? 'IN' : 'OUT'}</span></td>
              <td>${new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
              <td><span class="badge ${verClass}">${verLabel}</span></td>
              <td style="color:var(--text-muted);font-family:monospace;font-size:12px;">${r.ip || '-'}</td>
            </tr>
          `;
        }).join('');
      }
    }

    // Init
    document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];
    loadEmployees();
    loadAttendance();
  </script>
</body>
</html>
